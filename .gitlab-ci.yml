stages:
  - test
  - deploy

test:
  stage: test
  image: node:20
  script:
    - npm ci
    - npm test
  only:
    - main

deploy:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
  script:
    - >
      ssh -p ${VPS_PORT:-22} ${VPS_USER}@${VPS_HOST}
      "set -e;
      cd ${VPS_APP_DIR};
      git pull gitlab main;
      docker compose up -d --build;
      docker compose ps"
  only:
    - main
